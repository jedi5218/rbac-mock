app = "rbac-mock"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  ALGORITHM = "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES = "60"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
